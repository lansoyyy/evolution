<script>
(function () {
  var DESIGN_WIDTH = 1544;
  var DESIGN_HEIGHT = 851;
  var DESKTOP_MIN = 1025;

  function getViewportSize() {
    var vv = window.visualViewport;
    return {
      width: vv ? vv.width : window.innerWidth,
      height: vv ? vv.height : window.innerHeight
    };
  }

  function updateViewportFit() {
    var wrap = document.querySelector('.landing-scale-wrap');
    if (!wrap) return;

    var size = getViewportSize();
    if (size.width < DESKTOP_MIN) {
      wrap.style.transform = '';
      return;
    }

    // Fill screen width; crop top/bottom slightly if needed (no side bars).
    var scale = size.width / DESIGN_WIDTH;
    var scaledHeight = DESIGN_HEIGHT * scale;
    if (scaledHeight < size.height) {
      // Very tall/narrow viewport: scale to height so nothing is cut vertically.
      scale = size.height / DESIGN_HEIGHT;
    }

    wrap.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
  }

  window.addEventListener('resize', updateViewportFit);
  window.addEventListener('orientationchange', updateViewportFit);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', updateViewportFit);
  }
  updateViewportFit();
})();
</script>
