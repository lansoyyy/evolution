name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='home_screen_backup.html' \
            --exclude='.DS_Store' \
            ./ _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry deploy (attempt 2)
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (retry 2)
        id: deployment_retry_2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry deploy (attempt 3)
        if: steps.deployment_retry_2.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (retry 3)
        id: deployment_retry_3
        if: steps.deployment_retry_2.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Verify deployment succeeded
        if: |
          steps.deployment.outcome == 'failure' &&
          steps.deployment_retry_2.outcome == 'failure' &&
          steps.deployment_retry_3.outcome == 'failure'
        run: exit 1
